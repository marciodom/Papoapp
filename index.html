<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>PapoApp - Chat Completo</title>
    <!-- Favicon básico -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0b1419;
            --header-bg: #202c33;
            --message-bg: #202c33;
            --my-message-bg: #005c4b;
            --text-color: #e9edef;
            --input-bg: #2a3942;
            --border-color: #2a3942;
            --icon-color: #8696a0;
        }

        [data-theme="light"] {
            --bg-color: #e5ded8;
            --header-bg: #f0f2f4;
            --message-bg: #ffffff;
            --my-message-bg: #d9fdd3;
            --text-color: #111b21;
            --input-bg: #ffffff;
            --border-color: #e9edef;
            --icon-color: #54656f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(45deg, #0b1419 0%, #1f2c33 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 95vh;
            background: var(--bg-color);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            border: 1px solid var(--border-color);
        }

        .chat-header {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-avatar input {
            display: none;
        }

        .app-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
        }

        .user-status {
            font-size: 12px;
            color: var(--icon-color);
        }

        .header-actions {
            display: flex;
            gap: 20px;
        }

        .header-actions button {
            background: none;
            border: none;
            color: var(--icon-color);
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
        }

        .settings-menu {
            position: absolute;
            top: 60px;
            right: 16px;
            background: var(--header-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
            min-width: 200px;
            border: 1px solid var(--border-color);
        }

        .settings-menu.show {
            display: block;
        }

        .settings-menu h3 {
            color: var(--text-color);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .theme-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .theme-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 20px;
            background: var(--input-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 12px;
        }

        .theme-btn.active {
            background: #00a884;
            color: white;
        }

        .color-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-btn.selected {
            border-color: var(--text-color);
        }

        .bg-image-option label {
            display: block;
            padding: 8px;
            background: var(--input-bg);
            color: var(--text-color);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            margin-top: 10px;
        }

        .bg-image-option input {
            display: none;
        }

        /* BOTÃO DE LIMPAR MENSAGENS */
        .clear-chat-btn {
            width: 100%;
            padding: 10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 20px;
            margin-top: 15px;
            margin-bottom: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: background 0.3s;
        }

        .clear-chat-btn:hover {
            background: #ff6666;
        }

        .clear-chat-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .camera-section {
            background: #000;
            position: relative;
            display: none;
        }

        .camera-section.show {
            display: block;
        }

        #videoElement {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
        }

        .camera-controls {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .camera-controls button {
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--bg-color);
            background-size: cover;
            background-position: center;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.received {
            background: var(--message-bg);
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.sent {
            background: var(--my-message-bg);
            color: var(--text-color);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--icon-color);
            margin-top: 4px;
            text-align: right;
        }

        .message img, .message video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 5px;
        }

        .message a {
            color: var(--text-color);
            text-decoration: none;
            display: block;
            margin-top: 5px;
        }

        .attachment-preview {
            padding: 10px 16px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            gap: 10px;
            display: none;
        }

        .attachment-preview.show {
            display: flex;
        }

        .preview-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-color);
        }

        .preview-content img, .preview-content video {
            max-width: 50px;
            max-height: 50px;
            border-radius: 5px;
        }

        .remove-attachment {
            background: none;
            border: none;
            color: var(--icon-color);
            font-size: 20px;
            cursor: pointer;
        }

        .input-area {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--border-color);
        }

        .input-area button {
            background: none;
            border: none;
            color: var(--icon-color);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-input {
            flex: 1;
            background: var(--input-bg);
            border: none;
            border-radius: 25px;
            padding: 10px 15px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        .file-input {
            display: none;
        }

        .upload-progress {
            height: 3px;
            background: #00a884;
            width: 0%;
            transition: width 0.3s;
            position: absolute;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="user-info">
                <div class="user-avatar" id="avatarContainer">
                    <span id="avatarText">?</span>
                    <img id="avatarImage" style="display: none;">
                    <input type="file" id="avatarUpload" accept="image/*">
                </div>
                <div class="user-details">
                    <span class="app-name">PapoApp</span>
                    <span class="user-status" id="userStatus">online</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="cameraBtn">📹</button>
                <button id="settingsBtn">⚙️</button>
            </div>
        </div>

        <!-- Settings Menu -->
        <div class="settings-menu" id="settingsMenu">
            <h3>Tema</h3>
            <div class="theme-buttons">
                <button class="theme-btn active" data-theme="dark">Escuro</button>
                <button class="theme-btn" data-theme="light">Claro</button>
            </div>

            <h3>Cor de Fundo</h3>
            <div class="color-options" id="bgColorOptions">
                <div class="color-btn" style="background: #0b1419;" data-color="#0b1419"></div>
                <div class="color-btn" style="background: #1a2a33;" data-color="#1a2a33"></div>
                <div class="color-btn" style="background: #2a3b44;" data-color="#2a3b44"></div>
                <div class="color-btn" style="background: #3a4c55;" data-color="#3a4c55"></div>
                <div class="color-btn" style="background: #4a5d66;" data-color="#4a5d66"></div>
            </div>

            <h3>Imagem de Fundo</h3>
            <div class="bg-image-option">
                <input type="file" id="bgImageUpload" accept="image/*">
                <label for="bgImageUpload">📷 Escolher imagem</label>
            </div>

            <!-- BOTÃO DE LIMPAR MENSAGENS -->
            <button class="clear-chat-btn" id="clearChatBtn">
                🗑️ LIMPAR TODAS AS MENSAGENS
            </button>
        </div>

        <!-- Camera Section -->
        <div class="camera-section" id="cameraSection">
            <video id="videoElement" autoplay playsinline></video>
            <div class="camera-controls">
                <button id="closeCameraBtn">✕</button>
                <button id="capturePhotoBtn">📸</button>
            </div>
        </div>
          
        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea"></div>

        <!-- Attachment Preview -->
        <div class="attachment-preview" id="attachmentPreview">
            <div class="preview-content" id="previewContent"></div>
            <button class="remove-attachment" id="removeAttachment">✕</button>
            <div class="upload-progress" id="uploadProgress"></div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <button id="galleryBtn">📷</button>
            <input type="file" id="galleryInput" class="file-input" accept="image/*,video/*">
            
            <button id="fileBtn">📎</button>
            <input type="file" id="fileInput" class="file-input" multiple>
            
            <input type="text" class="message-input" id="messageInput" placeholder="Digite uma mensagem">
            <button id="sendBtn">📤</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        (function() {
            console.log("🚀 Iniciando PapoApp...");
            
            // CONFIGURAÇÃO SUPABASE
            const SUPABASE_URL = "https://nxicvaqqdynwicbpqdkf.supabase.co";
            const SUPABASE_ANON_KEY = "sb_publishable_3YDpcG6o8hMzmWeq0nOt_A_cZ00Zfc7";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // USUÁRIO (persistente)
            let userName = localStorage.getItem("papoapp_user");
            if (!userName) {
                const names = ["Ana", "João", "Maria", "Pedro", "Lucas", "Carla", "Paulo", "Sofia"];
                userName = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 1000);
                localStorage.setItem("papoapp_user", userName);
            }
            
            // ESTADO GLOBAL
            let currentAttachment = null;
            let stream = null;
            
            // ELEMENTOS DOM
            const elements = {
                messagesArea: document.getElementById('messagesArea'),
                settingsBtn: document.getElementById('settingsBtn'),
                settingsMenu: document.getElementById('settingsMenu'),
                cameraBtn: document.getElementById('cameraBtn'),
                cameraSection: document.getElementById('cameraSection'),
                videoElement: document.getElementById('videoElement'),
                closeCameraBtn: document.getElementById('closeCameraBtn'),
                capturePhotoBtn: document.getElementById('capturePhotoBtn'),
                avatarContainer: document.getElementById('avatarContainer'),
                avatarUpload: document.getElementById('avatarUpload'),
                avatarImage: document.getElementById('avatarImage'),
                avatarText: document.getElementById('avatarText'),
                galleryBtn: document.getElementById('galleryBtn'),
                galleryInput: document.getElementById('galleryInput'),
                fileBtn: document.getElementById('fileBtn'),
                fileInput: document.getElementById('fileInput'),
                messageInput: document.getElementById('messageInput'),
                sendBtn: document.getElementById('sendBtn'),
                attachmentPreview: document.getElementById('attachmentPreview'),
                previewContent: document.getElementById('previewContent'),
                removeAttachment: document.getElementById('removeAttachment'),
                uploadProgress: document.getElementById('uploadProgress'),
                bgImageUpload: document.getElementById('bgImageUpload'),
                bgColorOptions: document.querySelectorAll('.color-btn'),
                themeBtns: document.querySelectorAll('.theme-btn'),
                userStatus: document.getElementById('userStatus'),
                clearChatBtn: document.getElementById('clearChatBtn')
            };
            
            // ATUALIZA AVATAR INICIAL
            if (elements.avatarText) {
                elements.avatarText.textContent = userName.charAt(0).toUpperCase();
            }
            
            // ========== FUNÇÕES PRINCIPAIS ==========
            
            // Adiciona mensagem à interface
            function addMessageToUI(msg) {
                const messageDiv = document.createElement('div');
                messageDiv.className = msg.username === userName ? 'message sent' : 'message received';
                
                let content = '';
                if (msg.message) {
                    content += msg.message;
                }
                
                if (msg.attachment_url) {
                    const url = msg.attachment_url;
                    if (msg.attachment_type?.startsWith('image/')) {
                        content += `<br><img src="${url}" style="max-width:100%; max-height:200px; border-radius:8px;">`;
                    } else if (msg.attachment_type?.startsWith('video/')) {
                        content += `<br><video src="${url}" controls style="max-width:100%; max-height:200px;"></video>`;
                    } else {
                        content += `<br><a href="${url}" target="_blank" style="color: var(--text-color);">📎 ${msg.attachment_name || 'Anexo'}</a>`;
                    }
                }
                
                messageDiv.innerHTML = content;
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = msg.created_at ? new Date(msg.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : 'Agora';
                messageDiv.appendChild(timeDiv);
                
                elements.messagesArea.appendChild(messageDiv);
                elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight;
            }
            
            // Carrega mensagens do banco - SEM MENSAGEM DE FUNDO
            async function carregarMensagens() {
                try {
                    const { data, error } = await supabase
                        .from("messenge")
                        .select("*")
                        .order("id", { ascending: true });
                    
                    if (error) {
                        console.error("Erro ao carregar:", error);
                        return;
                    }
                    
                    elements.messagesArea.innerHTML = '';
                    if (data && data.length > 0) {
                        data.forEach(msg => addMessageToUI(msg));
                    }
                    // NÃO adiciona nenhuma mensagem quando vazio
                    
                    console.log(`📨 ${data?.length || 0} mensagens carregadas`);
                    
                } catch (error) {
                    console.error("Erro:", error);
                }
            }
            
            // FUNÇÃO PARA LIMPAR MENSAGENS
            async function limparTodasMensagens() {
                if (!elements.clearChatBtn) return;
                
                if (!confirm('⚠️ TEM CERTEZA? Isso vai apagar TODAS as mensagens para TODOS os usuários!')) {
                    return;
                }
                
                try {
                    elements.clearChatBtn.disabled = true;
                    elements.clearChatBtn.textContent = '🔄 APAGANDO...';
                    
                    console.log("🗑️ Apagando todas as mensagens...");
                    
                    const { error } = await supabase
                        .from("messenge")
                        .delete()
                        .neq("id", 0);
                    
                    if (error) throw error;
                    
                    elements.messagesArea.innerHTML = '';
                    
                    console.log("✅ Todas as mensagens apagadas com sucesso!");
                    alert('✅ Todas as mensagens foram apagadas com sucesso!');
                    
                } catch (error) {
                    console.error("❌ Erro ao limpar mensagens:", error);
                    alert('❌ Erro: ' + error.message);
                } finally {
                    elements.clearChatBtn.disabled = false;
                    elements.clearChatBtn.textContent = '🗑️ LIMPAR TODAS AS MENSAGENS';
                }
            }
            
            // Upload de arquivo para o Storage
            async function uploadFile(file) {
                try {
                    if (elements.uploadProgress) {
                        elements.uploadProgress.style.width = '0%';
                    }
                    
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${userName}/${Date.now()}.${fileExt}`;
                    
                    const { error } = await supabase.storage
                        .from('chat-attachments')
                        .upload(fileName, file);
                    
                    if (error) throw error;
                    
                    const { data: { publicUrl } } = supabase.storage
                        .from('chat-attachments')
                        .getPublicUrl(fileName);
                    
                    if (elements.uploadProgress) {
                        elements.uploadProgress.style.width = '100%';
                        setTimeout(() => {
                            elements.uploadProgress.style.width = '0%';
                        }, 1000);
                    }
                    
                    return {
                        url: publicUrl,
                        type: file.type,
                        name: file.name
                    };
                    
                } catch (error) {
                    console.error("Erro no upload:", error);
                    alert("Erro ao fazer upload: " + error.message);
                    return null;
                }
            }
            
            // Envia mensagem para o banco
            async function enviarMensagem(texto, attachmentData = null) {
                try {
                    const messageData = {
                        message: texto,
                        username: userName
                    };
                    
                    if (attachmentData) {
                        messageData.attachment_url = attachmentData.url;
                        messageData.attachment_type = attachmentData.type;
                        messageData.attachment_name = attachmentData.name;
                    }
                    
                    const { error } = await supabase
                        .from("messenge")
                        .insert([messageData]);
                    
                    if (error) {
                        console.error("Erro ao enviar:", error);
                        alert("Erro ao enviar mensagem: " + error.message);
                        return false;
                    }
                    
                    return true;
                    
                } catch (error) {
                    console.error("Erro:", error);
                    alert("Erro ao enviar mensagem");
                    return false;
                }
            }
            
            // ========== CONFIGURAÇÃO DOS EVENTOS ==========
            
            if (elements.settingsBtn) {
                elements.settingsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    elements.settingsMenu.classList.toggle('show');
                });
            }
            
            document.addEventListener('click', (e) => {
                if (elements.settingsMenu && !elements.settingsMenu.contains(e.target) && 
                    elements.settingsBtn && !elements.settingsBtn.contains(e.target)) {
                    elements.settingsMenu.classList.remove('show');
                }
            });
            
            if (elements.clearChatBtn) {
                elements.clearChatBtn.addEventListener('click', limparTodasMensagens);
            }
            
            elements.themeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    elements.themeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const theme = btn.getAttribute('data-theme');
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('papoapp_theme', theme);
                });
            });
            
            elements.bgColorOptions.forEach(btn => {
                btn.addEventListener('click', () => {
                    elements.bgColorOptions.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    const color = btn.getAttribute('data-color');
                    elements.messagesArea.style.backgroundColor = color;
                    elements.messagesArea.style.backgroundImage = 'none';
                    localStorage.setItem('papoapp_bg_color', color);
                });
            });
            
            if (elements.bgImageUpload) {
                elements.bgImageUpload.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            elements.messagesArea.style.backgroundImage = `url('${e.target.result}')`;
                            elements.messagesArea.style.backgroundSize = 'cover';
                            elements.messagesArea.style.backgroundPosition = 'center';
                            localStorage.setItem('papoapp_bg_image', e.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
            
            if (elements.cameraBtn) {
                elements.cameraBtn.addEventListener('click', async () => {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        elements.videoElement.srcObject = stream;
                        elements.cameraSection.classList.add('show');
                    } catch (err) {
                        alert('Erro ao acessar câmera: ' + err.message);
                    }
                });
            }
            
            if (elements.closeCameraBtn) {
                elements.closeCameraBtn.addEventListener('click', () => {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                        stream = null;
                    }
                    elements.cameraSection.classList.remove('show');
                });
            }
            
            if (elements.capturePhotoBtn) {
                elements.capturePhotoBtn.addEventListener('click', () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = elements.videoElement.videoWidth;
                    canvas.height = elements.videoElement.videoHeight;
                    canvas.getContext('2d').drawImage(elements.videoElement, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        const file = new File([blob], `foto-${Date.now()}.jpg`, { type: 'image/jpeg' });
                        currentAttachment = file;
                        
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            elements.previewContent.innerHTML = `<img src="${e.target.result}" style="max-width:50px; max-height:50px;">`;
                            elements.attachmentPreview.classList.add('show');
                        };
                        reader.readAsDataURL(file);
                    });
                    
                    elements.closeCameraBtn.click();
                });
            }
            
            if (elements.avatarContainer) {
                elements.avatarContainer.addEventListener('click', () => {
                    elements.avatarUpload.click();
                });
            }
            
            if (elements.avatarUpload) {
                elements.avatarUpload.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            elements.avatarImage.src = e.target.result;
                            elements.avatarImage.style.display = 'block';
                            elements.avatarText.style.display = 'none';
                            localStorage.setItem('papoapp_avatar', e.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
            
            if (elements.galleryBtn) {
                elements.galleryBtn.addEventListener('click', () => {
                    elements.galleryInput.click();
                });
            }
            
            if (elements.galleryInput) {
                elements.galleryInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        currentAttachment = file;
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            elements.previewContent.innerHTML = `<img src="${e.target.result}" style="max-width:50px; max-height:50px;">`;
                            elements.attachmentPreview.classList.add('show');
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }
            
            if (elements.fileBtn) {
                elements.fileBtn.addEventListener('click', () => {
                    elements.fileInput.click();
                });
            }
            
            if (elements.fileInput) {
                elements.fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        currentAttachment = file;
                        elements.previewContent.innerHTML = `<span>📎 ${file.name}</span>`;
                        elements.attachmentPreview.classList.add('show');
                    }
                });
            }
            
            if (elements.removeAttachment) {
                elements.removeAttachment.addEventListener('click', () => {
                    currentAttachment = null;
                    elements.attachmentPreview.classList.remove('show');
                    elements.previewContent.innerHTML = '';
                    if (elements.galleryInput) elements.galleryInput.value = '';
                    if (elements.fileInput) elements.fileInput.value = '';
                });
            }
            
            if (elements.sendBtn) {
                elements.sendBtn.addEventListener('click', async () => {
                    const text = elements.messageInput.value.trim();
                    
                    if (text || currentAttachment) {
                        elements.sendBtn.disabled = true;
                        
                        try {
                            let attachmentData = null;
                            
                            if (currentAttachment) {
                                attachmentData = await uploadFile(currentAttachment);
                                if (!attachmentData) {
                                    elements.sendBtn.disabled = false;
                                    return;
                                }
                            }
                            
                            const success = await enviarMensagem(text, attachmentData);
                            
                            if (success) {
                                elements.messageInput.value = '';
                                if (elements.removeAttachment) {
                                    elements.removeAttachment.click();
                                }
                            }
                            
                        } catch (error) {
                            console.error("Erro:", error);
                            alert("Erro ao enviar mensagem");
                        } finally {
                            elements.sendBtn.disabled = false;
                        }
                    }
                });
            }
            
            if (elements.messageInput) {
                elements.messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (elements.sendBtn) {
                            elements.sendBtn.click();
                        }
                    }
                });
            }
            
            window.addEventListener('online', () => {
                if (elements.userStatus) elements.userStatus.textContent = 'online';
            });
            
            window.addEventListener('offline', () => {
                if (elements.userStatus) elements.userStatus.textContent = 'offline';
            });
            
            // ========== REALTIME ==========
            supabase
                .channel('chat')
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'messenge' }, 
                    (payload) => {
                        console.log("📨 Nova mensagem:", payload.new);
                        addMessageToUI(payload.new);
                    }
                )
                .on('postgres_changes',
                    { event: 'DELETE', schema: 'public', table: 'messenge' },
                    () => {
                        console.log("🗑️ Mensagem deletada, recarregando...");
                        carregarMensagens();
                    }
                )
                .subscribe();
            
            // ========== CARREGAR CONFIGURAÇÕES SALVAS ==========
            
            const savedTheme = localStorage.getItem('papoapp_theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                elements.themeBtns.forEach(btn => {
                    if (btn.getAttribute('data-theme') === savedTheme) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
            
            const savedColor = localStorage.getItem('papoapp_bg_color');
            if (savedColor) {
                elements.messagesArea.style.backgroundColor = savedColor;
                elements.bgColorOptions.forEach(btn => {
                    if (btn.getAttribute('data-color') === savedColor) {
                        btn.classList.add('selected');
                    }
                });
            }
            
            const savedImage = localStorage.getItem('papoapp_bg_image');
            if (savedImage) {
                elements.messagesArea.style.backgroundImage = `url('${savedImage}')`;
                elements.messagesArea.style.backgroundSize = 'cover';
                elements.messagesArea.style.backgroundPosition = 'center';
            }
            
            const savedAvatar = localStorage.getItem('papoapp_avatar');
            if (savedAvatar && elements.avatarImage && elements.avatarText) {
                elements.avatarImage.src = savedAvatar;
                elements.avatarImage.style.display = 'block';
                elements.avatarText.style.display = 'none';
            }
            
            // ========== SERVICE WORKER - REGISTRO CORRETO ==========
            if ('serviceWorker' in navigator) {
                console.log('📦 Registrando Service Worker...');
                
                navigator.serviceWorker.register('/Papoapp/sw.js', { 
                    scope: '/Papoapp/' 
                })
                .then(function(registration) {
                    console.log('✅ Service Worker registrado!', registration.scope);
                    
                    registration.addEventListener('updatefound', function() {
                        console.log('🔄 Nova versão do SW encontrada');
                    });
                })
                .catch(function(error) {
                    console.log('❌ Falha no registro:', error);
                });
                
                navigator.serviceWorker.ready.then(function(registration) {
                    console.log('✅ Service Worker está ativo e pronto!');
                });
            } else {
                console.log('ℹ️ Service Worker não suportado');
            }
            
            // ========== INICIAR ==========
            carregarMensagens();
            console.log(`✅ App iniciado com usuário: ${userName}`);
        })();
    </script>
</body>
</html>
